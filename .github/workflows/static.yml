name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase credentials into HTML files
        run: |
          # Safely escape secrets (handles &, |, /, etc.)
          URL=$(printf '%s' "${{ secrets.SUPABASE_URL }}" | sed 's/[&|]/\\&/g')
          KEY=$(printf '%s' "${{ secrets.SUPABASE_ANON_KEY }}" | sed 's/[&|]/\\&/g')

          sed -i "s|%%SUPABASE_URL%%|$URL|g" login.html
          sed -i "s|%%SUPABASE_URL%%|$URL|g" index.html
          sed -i "s|%%SUPABASE_ANON_KEY%%|$KEY|g" login.html
          sed -i "s|%%SUPABASE_ANON_KEY%%|$KEY|g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
